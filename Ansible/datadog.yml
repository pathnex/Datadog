- name: Install Datadog Agent
  hosts: datadog_agents
  become: yes

  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "Pathnex-ec2-key.pem"  # Change this with your Private key name and place
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  roles:
    - datadog.dd.agent